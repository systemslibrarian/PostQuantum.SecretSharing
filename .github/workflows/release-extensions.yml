name: Release Extensions

# Triggered by pushing an `ext-v*.*.*` tag (distinct from the core `v*` and VSS `vss-v*`
# tags so the packages release independently). Verifies the tag matches the Extensions
# csproj <Version>, builds + tests + packs the opt-in PostQuantum.SecretSharing.Extensions
# package (with provenance + SBOM), attaches the artifacts to a GitHub release, and
# publishes to nuget.org using Trusted Publishing (OIDC) — no long-lived NUGET_API_KEY.
#
# ONE-TIME SETUP before the first tag push (see docs/TRUSTED-PUBLISHING.md):
#   1. The core dependency (PostQuantum.SecretSharing, the version referenced by the
#      Extensions csproj) must already be published to nuget.org.
#   2. Create a nuget.org Trusted Publishing policy for package id
#      `PostQuantum.SecretSharing.Extensions` pinning owner + repo + THIS workflow file
#      (`release-extensions.yml`) + the `nuget` environment.

on:
  push:
    tags:
      - "ext-v[0-9]+.[0-9]+.[0-9]+"
      - "ext-v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. ext-v2.2.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  CI: 'true'
  PROJECT: 'src/PostQuantum.SecretSharing.Extensions/PostQuantum.SecretSharing.Extensions.csproj'
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build, attest, release, publish (Extensions)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: nuget

    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (tag)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # The Extensions csproj <Version> is the source of truth. The tag (minus the `ext-v`
      # prefix) must match it, or we refuse to release a mislabelled package.
      - name: Verify tag matches csproj <Version>
        shell: bash
        run: |
          set -euo pipefail
          tag="${TAG#ext-v}"
          csproj_version=$(grep -oE "<Version>[^<]+</Version>" "$PROJECT" | sed -E 's/<\/?Version>//g')
          if [ "$tag" != "$csproj_version" ]; then
            echo "::error::Tag $TAG (parsed '$tag') does not match <Version>$csproj_version</Version> in $PROJECT."
            exit 1
          fi
          echo "Releasing PostQuantum.SecretSharing.Extensions $csproj_version from $TAG."

      - name: Restore
        run: dotnet restore PostQuantum.SecretSharing.sln

      - name: Build (reproducible)
        run: dotnet build PostQuantum.SecretSharing.sln -c Release --no-restore

      - name: Test net8.0
        run: dotnet test PostQuantum.SecretSharing.sln -c Release --no-build -f net8.0 --filter "Category!=bench&Category!=timing"

      - name: Test net10.0
        run: dotnet test PostQuantum.SecretSharing.sln -c Release --no-build -f net10.0 --filter "Category!=bench&Category!=timing"

      - name: Pack
        run: dotnet pack "$PROJECT" -c Release --no-build -o artifacts

      - name: Generate SBOM (CycloneDX)
        shell: bash
        run: |
          dotnet tool install --global CycloneDX --version 6.2.0
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet CycloneDX "$PROJECT" -o artifacts -F Json

      - name: Compute SHA-256 hashes
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts
          sha256sum *.nupkg *.snupkg | tee SHA256SUMS.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            artifacts/*.nupkg
            artifacts/*.snupkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.TAG }}
          name: PostQuantum.SecretSharing.Extensions ${{ env.TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.TAG, '-') }}
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
            artifacts/SHA256SUMS.txt
            artifacts/bom.json

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish to NuGet
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: |
          dotnet nuget push artifacts/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
