name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least-privilege default for the whole workflow; jobs widen only what they need.
permissions:
  contents: read

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'
  CI: 'true'

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
    steps:
      # Egress audit on Linux (harden-runner supports Ubuntu only).
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      # ML-DSA-65 (FIPS 204) on Linux requires OpenSSL >= 3.5. Ubuntu runners may
      # ship an older OpenSSL; the ML-DSA *tests* skip at runtime when the backend
      # is unavailable, so the suite stays green regardless. When OpenSSL >= 3.5 is
      # present, the ML-DSA layer is exercised for real.
      #
      # TODO: pin a known OpenSSL >= 3.5 build here (side-by-side install + set
      # the loader path) once a stable recipe is settled, to exercise the ML-DSA
      # layer on Linux in CI as well as on Windows.
      - name: Report OpenSSL version (Linux)
        if: runner.os == 'Linux'
        run: openssl version || true

      - name: Setup Python (for vector drift check)
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Restore
        run: dotnet restore PostQuantum.SecretSharing.sln

      - name: Build (warnings as errors)
        run: dotnet build PostQuantum.SecretSharing.sln -c Release --no-restore

      # Formatting / analyzer-style gate: fails if code is not canonically formatted.
      # Runs once (Linux) — formatting is platform-invariant.
      - name: Verify formatting (dotnet format)
        if: runner.os == 'Linux'
        run: dotnet format PostQuantum.SecretSharing.sln --verify-no-changes --no-restore

      - name: Test net8.0 (excludes bench)
        run: dotnet test PostQuantum.SecretSharing.sln -c Release --no-build -f net8.0 --filter "Category!=bench&Category!=timing"

      - name: Test net10.0 (excludes bench; ML-DSA skips where unsupported)
        run: dotnet test PostQuantum.SecretSharing.sln -c Release --no-build -f net10.0 --filter "Category!=bench&Category!=timing"

      # Regenerate the test vectors from the independent Python reference and fail
      # if they differ from what's committed (C.1 drift guard).
      - name: Vector regeneration drift check
        run: |
          python reference/generate_vectors.py
          git diff --exit-code docs/test-vectors.json
        shell: bash

  # Prove the compiled assemblies are byte-for-byte reproducible (deterministic +
  # ContinuousIntegrationBuild path mapping). Backs the reproducible-build claim.
  reproducible:
    name: Reproducible build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/PostQuantum.SecretSharing/PostQuantum.SecretSharing.csproj

      - name: Build twice and compare assembly hashes
        run: |
          set -euo pipefail
          proj=src/PostQuantum.SecretSharing/PostQuantum.SecretSharing.csproj
          for tfm in net8.0 net10.0; do
            dotnet build "$proj" -c Release -f "$tfm" --no-restore --no-incremental -o "out-a/$tfm"
            dotnet build "$proj" -c Release -f "$tfm" --no-restore --no-incremental -o "out-b/$tfm"
            a=$(sha256sum "out-a/$tfm/PostQuantum.SecretSharing.dll" | cut -d' ' -f1)
            b=$(sha256sum "out-b/$tfm/PostQuantum.SecretSharing.dll" | cut -d' ' -f1)
            echo "$tfm -> $a"
            if [ "$a" != "$b" ]; then
              echo "::error::Build is NOT reproducible for $tfm ($a != $b)"
              exit 1
            fi
          done
        shell: bash

  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: [ test, reproducible ]
    permissions:
      contents: read
      id-token: write       # for build-provenance attestation
      attestations: write   # for build-provenance attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Setup .NET (8 + 10)
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/PostQuantum.SecretSharing/PostQuantum.SecretSharing.csproj

      # ContinuousIntegrationBuild=true is set automatically via Directory.Build.props
      # when CI=true (see env above), enabling deterministic path mapping for
      # reproducible builds.
      - name: Pack
        run: dotnet pack src/PostQuantum.SecretSharing/PostQuantum.SecretSharing.csproj -c Release --no-restore -o artifacts

      # Software Bill of Materials (CycloneDX) for the package.
      - name: Generate SBOM (CycloneDX)
        run: |
          # Pin the tool: the CLI dropped the `-j` flag in 6.x; an unpinned
          # install floats and breaks the build. -F Json is the 6.x equivalent.
          dotnet tool install --global CycloneDX --version 6.2.0
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet CycloneDX src/PostQuantum.SecretSharing/PostQuantum.SecretSharing.csproj -o artifacts -F Json
        shell: bash

      # SLSA build provenance for the released artifacts (only on push to main,
      # where OIDC + attestations are available — not on fork PRs).
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/*.nupkg'

      - name: Upload .nupkg + SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkg
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
            artifacts/bom.json

  # Flag risky dependency changes (license / known-vuln) on pull requests.
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
